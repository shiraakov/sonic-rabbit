  <circle cx="14.5" cy="22" r="1.6" fill="#FAFAF7"/>
  <circle cx="21.5" cy="22" r="1.6" fill="#FAFAF7"/>
  <!-- Pupils -->
  <circle cx="14.9" cy="22.3" r=".7" fill="#37352F"/>
  <circle cx="21.9" cy="22.3" r=".7" fill="#37352F"/>
  <!-- Nose -->
