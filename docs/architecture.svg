<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" width="1200" height="580" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#111" letter-spacing="2">SONIC RABBIT — ARCHITECTURE</text>

  <!-- ══════════════════════════════════════════════════════
       TOP LEFT: Browser / Frontend
  ══════════════════════════════════════════════════════ -->
  <rect x="55" y="70" width="340" height="240" rx="12" fill="#f0f6ff" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="55" y="70" width="340" height="44" rx="12" fill="#dbeafe"/>
  <rect x="55" y="102" width="340" height="12" fill="#dbeafe"/>
  <text x="225" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8" letter-spacing="1">BROWSER / FRONTEND</text>
  <text x="80" y="132" font-size="11" fill="#444">1.  Journey player + narration</text>
  <text x="80" y="154" font-size="11" fill="#444">2.  Search + prompt chips</text>
  <text x="80" y="176" font-size="11" fill="#444">3.  Request new journey form</text>
  <text x="80" y="198" font-size="11" fill="#444">4.  HTMX — no client JS state</text>

  <!-- ══════════════════════════════════════════════════════
       TOP RIGHT: Journey Factory
  ══════════════════════════════════════════════════════ -->
  <rect x="805" y="70" width="340" height="240" rx="12" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="805" y="70" width="340" height="44" rx="12" fill="#dcfce7"/>
  <rect x="805" y="102" width="340" height="12" fill="#dcfce7"/>
  <text x="975" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d" letter-spacing="1">JOURNEY FACTORY</text>
  <text x="830" y="132" font-size="11" fill="#444">1.  REST API + rate limiter + queue</text>
  <text x="830" y="154" font-size="11" fill="#444">2.  Semantic search (MiniLM, local)</text>
  <text x="830" y="176" font-size="11" fill="#444">3.  6 ADK pipeline agents</text>
  <text x="830" y="198" font-size="11" fill="#444">4.  MCP server — iTunes · MusicBrainz · Wikipedia</text>

  <!-- ══════════════════════════════════════════════════════
       BOTTOM CENTER: Data Store cylinder
  ══════════════════════════════════════════════════════ -->
  <rect x="490" y="420" width="220" height="105" fill="#faf5ff" stroke="#9333ea" stroke-width="1.5"/>
  <ellipse cx="600" cy="420" rx="110" ry="24" fill="#ede9fe" stroke="#9333ea" stroke-width="1.5"/>
  <ellipse cx="600" cy="525" rx="110" ry="24" fill="#faf5ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="600" y="462" text-anchor="middle" font-size="13" font-weight="700" fill="#7e22ce">DATA STORE</text>
  <text x="600" y="484" text-anchor="middle" font-size="11" fill="#555">1.  journeys.json</text>
  <text x="600" y="504" text-anchor="middle" font-size="11" fill="#555">2.  audio/*.wav</text>

  <!-- ══════════════════════════════════════════════════════
       ARROW 1: Frontend → Factory  (top, horizontal)
  ══════════════════════════════════════════════════════ -->
  <line x1="395" y1="168" x2="799" y2="168" stroke="#3b82f6" stroke-width="1.8"/>
  <polygon points="795,162 807,168 795,174" fill="#3b82f6"/>
  <text x="597" y="158" text-anchor="middle" font-size="11" fill="#3b82f6">request new journey</text>

  <!-- ══════════════════════════════════════════════════════
       ARROW 2: Factory → DB  (right diagonal, down-left)
  ══════════════════════════════════════════════════════ -->
  <line x1="965" y1="310" x2="706" y2="412" stroke="#16a34a" stroke-width="1.8"/>
  <polygon points="710,404 700,418 697,404" fill="#16a34a"/>
  <text x="872" y="385" text-anchor="middle" font-size="11" fill="#16a34a" transform="rotate(-20, 872, 385)">generates &amp; writes</text>

  <!-- ══════════════════════════════════════════════════════
       ARROW 3: DB → Frontend  (left diagonal, up-left)
  ══════════════════════════════════════════════════════ -->
  <line x1="494" y1="412" x2="235" y2="310" stroke="#9333ea" stroke-width="1.8" stroke-dasharray="6 3"/>
  <polygon points="241,304 229,314 239,321" fill="#9333ea"/>
  <text x="328" y="385" text-anchor="middle" font-size="11" fill="#9333ea" transform="rotate(20, 328, 385)">on refresh, pulls content</text>

  <!-- Footer -->
  <text x="600" y="566" text-anchor="middle" font-size="11" fill="#aaa">google-adk · gemini-2.5-flash · kokoro-82m onnx · fastapi · htmx · minilm · itunes · deezer · musicbrainz · wikipedia</text>

</svg>
