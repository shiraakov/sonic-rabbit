<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Sonic Rabbit{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</head>
<body>
  <header class="site-header">
    <a href="/" class="logo"><img src="/static/logo-rabbit.png" class="logo-img" alt="Sonic Rabbit"> Sonic Rabbit</a>
    <form class="search-form" action="/" method="get">
      <input
        class="search-input"
        type="text"
        name="q"
        placeholder="try &quot;protest songs&quot; or &quot;one city one decade&quot;"
        value="{{ q if q is defined else '' }}"
        autocomplete="off"
      >
      <button class="search-btn" type="submit">→</button>
    </form>
  </header>

  {% block breadcrumb %}{% endblock %}

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
