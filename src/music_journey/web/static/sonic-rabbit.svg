  <!-- Headphone band -->
  <path d="M 5.5 22 C 5.5 9 30.5 9 30.5 22" stroke="#CC782F" stroke-width="2.4" stroke-linecap="round"/>
  <!-- Left cup -->
  <rect x="2" y="19.5" width="6" height="7" rx="2" fill="#CC782F"/>
  <!-- Right cup -->
  <rect x="28" y="19.5" width="6" height="7" rx="2" fill="#CC782F"/>
  <!-- Cup highlight -->
  <rect x="3.5" y="21" width="2" height="2" rx="1" fill="rgba(255,255,255,0.35)"/>
  <rect x="29.5" y="21" width="2" height="2" rx="1" fill="rgba(255,255,255,0.35)"/>
