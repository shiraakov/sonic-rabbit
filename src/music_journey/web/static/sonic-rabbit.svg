  <!-- Right ear -->
  <ellipse cx="24" cy="9" rx="3.5" ry="7.5" fill="#37352F" transform="rotate(8 24 9)"/>
  <!-- Head -->
  <circle cx="18" cy="24" r="10" fill="#37352F"/>
